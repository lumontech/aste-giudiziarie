# Nginx reverse proxy per Aste Giudiziarie
# Sostituire __DOMAIN__ con il dominio reale (es. 203-0-113-5.nip.io)
# install.sh lo fa in automatico.

server {
    listen 80;
    server_name __DOMAIN__;

    # Limite upload (non serve molto qui)
    client_max_body_size 4M;

    # Log
    access_log /var/log/nginx/aste.access.log;
    error_log  /var/log/nginx/aste.error.log;

    # Health check pubblico per certbot/uptime
    location = /api/ping {
        proxy_pass http://127.0.0.1:5000/api/ping;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Lo scraping è lento — alziamo i timeout
        proxy_read_timeout    300s;
        proxy_send_timeout    300s;
        proxy_connect_timeout 30s;
    }
}
